name: Deploy CDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::933500793398:role/github-actions-cdk-deploy
          aws-region: us-east-1

      - name: CDK Synth
        run: npx cdk synth

      - name: CDK Deploy Beta
        if: github.ref == 'refs/heads/main'
        run: npx cdk deploy Beta-PersistenceStack --require-approval never