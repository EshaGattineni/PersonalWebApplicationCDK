name: Deploy CDK Multi-Stage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      - run: npm install
      - name: Synth all stacks
        run: npx cdk synth

  deploy-beta:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: beta
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      - run: npm install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::933500793398:role/github-actions-cdk-deploy
          aws-region: us-west-2
      - run: npx cdk deploy Beta-PersistenceStack --require-approval never

  deploy-prod:
    needs: deploy-beta
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '22' }
      - run: npm install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::933500793398:role/github-actions-cdk-deploy
          aws-region: us-east-1
      - run: npx cdk deploy Prod-PersistenceStack --require-approval never